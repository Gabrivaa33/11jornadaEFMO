<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>11 Ideal</title>
  <link rel="icon" href="./favicon.ico" type="image/x-icon">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(120deg, #03045e, #001233 70%);
      color: white;
    }

    .container-informe {
      max-width: 1200px;
      margin: auto;
      padding: 40px 20px;
    }

    .header-informe {
  max-width: 600px;
  width: 100%;
  margin: 0 auto 40px auto;
  text-align: center;
}

.container-responsive {
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

    .header-informe h1 {
      color: #00b4d8;
    }

    .container-responsive {
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    .header-responsive {
      background: #d32f2f;
      color: white;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
    }

    .field-container-responsive {
      padding: 15px;
      background: #f0f0f0;
    }

    .field-responsive {
      position: relative;
      height: 450px;
      border-radius: 8px;
      background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
      overflow: hidden;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
    }

    .grass-pattern-responsive {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 30px 30px;
      opacity: 0.3;
    }

    .players-formation-responsive {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
    }

    .player-row-responsive {
      display: flex;
      justify-content: space-around;
    }

    .player-responsive {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 70px;
      position: relative;
    }

    .player-circle-responsive {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #d32f2f;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      border: 2px solid white;
      z-index: 2;
      position: relative;
    }

    .player-name-responsive {
      margin-top: 4px;
      font-size: 0.7rem;
      text-align: center;
      max-width: 70px;
      font-weight: bold;
      line-height: 1.1;
    }

    /* =========================
       ESTADÍSTICAS (FIXED) 
    ========================= */

    .player-stats-right {
      position: absolute;
      left: 48px;
      top: -10px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      z-index: 3;
      font-size: 0.85rem;
      line-height: 1;
      white-space: nowrap;
    }

    .player-stats-left {
      position: absolute;
      right: 48px;
      top: -10px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      font-size: 0.85rem;
      line-height: 1;
      z-index: 3;
      white-space: nowrap;
    }

    .player-goals-row,
    .player-assists-row {
      white-space: nowrap;
      display: inline-block;
      line-height: 1;
    }

    /* =========================
       ENTRENADOR
    ========================= */

    .coach-container {
      position: absolute;
      bottom: 10px;
      right: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 5;
    }

    .coach-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #1e88e5;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      border: 2px solid white;
    }

    .coach-name {
      font-size: 0.65rem;
      margin-top: 3px;
      font-weight: bold;
      text-align: center;
    }

  </style>
</head>

<body>

<div class="container-informe">

  <div class="header-informe">
    <h1>11 Ideal 18 y 19 Marzo</h1>
  </div>

  <div class="container-responsive">

    <div class="header-responsive">
      <div>E.F.M.O. Boadilla</div>
      <div>3-5-2</div>
    </div>

    <div class="field-container-responsive">
      <div class="field-responsive">

        <div class="grass-pattern-responsive"></div>

        <div class="players-formation-responsive" id="formation-container"></div>

        <!-- ENTRENADOR FIJO -->
        <div class="coach-container">
          <div class="coach-circle">IH</div>
          <div class="coach-name">Luis Tinoco</div>
        </div>

      </div>
    </div>

  </div>

</div>

<script>

const players = {
  portero: [
    { number: 'CB', name: 'Iván', goals: 0, assists: 0, cards: '🔒🔒' }
  ],
  defensas: [
    { number: 'CC', name: 'Santi', goals: 0, assists: 0, cards: '' },
    { number: 'SB', name: 'Kito', goals: 1, assists: 0, cards: '' },
    { number: 'JC', name: 'Pablo García', goals: 1, assists: 0, cards: '' }
  ],
  mediocentros: [
    { number: 'JB', name: 'Ares', goals: 2, assists: 0, cards: '' },
    { number: 'CF', name: 'Gade', goals: 1, assists: 0, cards: '' },
    { number: 'JB', name: 'Tapata', goals: 1, assists: 0, cards: '' },
    { number: 'CE', name: 'Aitor', goals: 1, assists: 0, cards: '' },
    { number: 'IH', name: 'Medio 5', goals: 0, assists: 0, cards: '' }
  ],
  delanteros: [
    { number: 'SB', name: 'Griñán', goals: 2, assists: 1, cards: '' },
    { number: 'CF', name: 'Alejo', goals: 2, assists: 0, cards: '' }
  ]
};

const formation = [
  players.delanteros,
  players.mediocentros,
  players.defensas,
  players.portero
];

function renderFormation() {
  const container = document.getElementById('formation-container');
  container.innerHTML = '';

  formation.forEach(rowPlayers => {
    const row = document.createElement('div');
    row.className = 'player-row-responsive';

    rowPlayers.forEach(player => {
      const el = document.createElement('div');
      el.className = 'player-responsive';

      const goalsHTML = player.goals > 0
        ? `<div class="player-goals-row">${Array(player.goals).fill('⚽').join('')}</div>`
        : '';

      const assistsHTML = player.assists > 0
        ? `<div class="player-assists-row">${Array(player.assists).fill('🅰️').join('')}</div>`
        : '';

      el.innerHTML = `
        <div class="player-stats-left">${player.cards}</div>
        <div class="player-stats-right">
          ${goalsHTML}
          ${assistsHTML}
        </div>
        <div class="player-circle-responsive">${player.number}</div>
        <div class="player-name-responsive">${player.name}</div>
      `;

      row.appendChild(el);
    });

    container.appendChild(row);
  });
}

renderFormation();

</script>

</body>
</html>
